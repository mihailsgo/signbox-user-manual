<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SignBox journey overview</title>
  <desc id="desc">A five-step visual overview of the SignBox document signing journey from process creation to signed document completion.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5F9FF"/>
      <stop offset="1" stop-color="#EEF3FA"/>
    </linearGradient>
    <linearGradient id="line" x1="140" y1="334" x2="1140" y2="334" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C9D8F0"/>
      <stop offset="0.5" stop-color="#84A6DE"/>
      <stop offset="1" stop-color="#C9D8F0"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1280" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#123A73" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1280" height="720" rx="32" fill="url(#bg)"/>
  <circle cx="1124" cy="126" r="108" fill="#DCE8FA"/>
  <circle cx="1168" cy="164" r="56" fill="#EEF4FD"/>
  <circle cx="126" cy="604" r="84" fill="#E1EBFA"/>

  <g filter="url(#shadow)">
    <rect x="70" y="72" width="1140" height="576" rx="28" fill="white"/>
  </g>

  <text x="110" y="138" fill="#0E2A52" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="700">How SignBox works</text>
  <text x="110" y="178" fill="#4B6283" font-family="Segoe UI, Arial, sans-serif" font-size="22">A secure document workflow from setup to signed completion.</text>

  <path d="M140 334H1140" stroke="url(#line)" stroke-width="10" stroke-linecap="round"/>

  <g>
    <circle cx="170" cy="334" r="38" fill="#0E5CCB"/>
    <circle cx="170" cy="334" r="28" fill="#F4F8FF"/>
    <path d="M156 322H184V346H156V322Z" stroke="#0E5CCB" stroke-width="3"/>
    <path d="M170 314V334" stroke="#0E5CCB" stroke-width="3" stroke-linecap="round"/>
    <path d="M163 321L170 314L177 321" stroke="#0E5CCB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="128" y="402" fill="#0E2A52" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">1. Create</text>
    <text x="96" y="432" fill="#5A6F8D" font-family="Segoe UI, Arial, sans-serif" font-size="17">Upload a document and</text>
    <text x="108" y="456" fill="#5A6F8D" font-family="Segoe UI, Arial, sans-serif" font-size="17">choose its process type.</text>
  </g>

  <g>
    <circle cx="395" cy="334" r="38" fill="#0E5CCB"/>
    <circle cx="395" cy="334" r="28" fill="#F4F8FF"/>
    <path d="M382 324C382 319.582 385.582 316 390 316H400C404.418 316 408 319.582 408 324V344H382V324Z" stroke="#0E5CCB" stroke-width="3"/>
    <path d="M378 346H412" stroke="#0E5CCB" stroke-width="3" stroke-linecap="round"/>
    <circle cx="390" cy="325" r="3" fill="#0E5CCB"/>
    <circle cx="400" cy="325" r="3" fill="#0E5CCB"/>
    <text x="340" y="402" fill="#0E2A52" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">2. Configure</text>
    <text x="323" y="432" fill="#5A6F8D" font-family="Segoe UI, Arial, sans-serif" font-size="17">Add recipients, roles,</text>
    <text x="319" y="456" fill="#5A6F8D" font-family="Segoe UI, Arial, sans-serif" font-size="17">due dates, and comments.</text>
  </g>

  <g>
    <circle cx="640" cy="334" r="38" fill="#0E5CCB"/>
    <circle cx="640" cy="334" r="28" fill="#F4F8FF"/>
    <path d="M624 332L638 344L658 324" stroke="#0E5CCB" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="601" y="402" fill="#0E2A52" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">3. Launch</text>
    <text x="589" y="432" fill="#5A6F8D" font-family="Segoe UI, Arial, sans-serif" font-size="17">Start the process and</text>
    <text x="576" y="456" fill="#5A6F8D" font-family="Segoe UI, Arial, sans-serif" font-size="17">deliver secure invitations.</text>
  </g>

  <g>
    <circle cx="885" cy="334" r="38" fill="#0E5CCB"/>
    <circle cx="885" cy="334" r="28" fill="#F4F8FF"/>
    <rect x="872" y="317" width="26" height="34" rx="5" stroke="#0E5CCB" stroke-width="3"/>
    <circle cx="885" cy="344" r="2.5" fill="#0E5CCB"/>
    <path d="M879 323H891" stroke="#0E5CCB" stroke-width="3" stroke-linecap="round"/>
    <text x="841" y="402" fill="#0E2A52" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">4. Sign</text>
    <text x="814" y="432" fill="#5A6F8D" font-family="Segoe UI, Arial, sans-serif" font-size="17">Recipients review, sign,</text>
    <text x="808" y="456" fill="#5A6F8D" font-family="Segoe UI, Arial, sans-serif" font-size="17">approve, or decline online.</text>
  </g>

  <g>
    <circle cx="1110" cy="334" r="38" fill="#0E5CCB"/>
    <circle cx="1110" cy="334" r="28" fill="#F4F8FF"/>
    <path d="M1092 347H1128" stroke="#0E5CCB" stroke-width="3" stroke-linecap="round"/>
    <path d="M1098 337L1110 325L1122 337" stroke="#0E5CCB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M1110 325V347" stroke="#0E5CCB" stroke-width="3" stroke-linecap="round"/>
    <text x="1058" y="402" fill="#0E2A52" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">5. Track</text>
    <text x="1027" y="432" fill="#5A6F8D" font-family="Segoe UI, Arial, sans-serif" font-size="17">Monitor progress, open</text>
    <text x="1029" y="456" fill="#5A6F8D" font-family="Segoe UI, Arial, sans-serif" font-size="17">history, and download results.</text>
  </g>

  <rect x="110" y="536" width="1060" height="72" rx="18" fill="#F5F8FD"/>
  <text x="140" y="580" fill="#123A73" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Internal portal</text>
  <text x="324" y="580" fill="#607694" font-family="Segoe UI, Arial, sans-serif" font-size="20">for initiators and operations</text>
  <text x="700" y="580" fill="#123A73" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">External portal</text>
  <text x="882" y="580" fill="#607694" font-family="Segoe UI, Arial, sans-serif" font-size="20">for recipients and signing</text>
</svg>
