name: Docs Quality

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  lint-and-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            README.md
            docs/*.md

      - name: Link Check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --verbose --include-fragments README.md docs/*.md
          fail: true
