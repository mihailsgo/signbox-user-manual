# Screenshot annotation spec for scripts/annotate_screenshots.py
# Coordinates are in pixels: x, y, width, height.
# If UI layout changes, adjust the coordinates below.

images:
  - input: assets/01-login-page.png
    output: assets/annotated/step-01-login.png
    annotations:
      - step: 1
        label: "Enter username"
        rect: [790, 330, 330, 46]
      - step: 2
        label: "Enter password"
        rect: [790, 395, 330, 46]
      - step: 3
        label: "Click Sign in"
        rect: [790, 470, 330, 46]

  - input: assets/02-home-create-process.png
    output: assets/annotated/step-02-upload.png
    annotations:
      - step: 1
        label: "Upload file here"
        rect: [460, 190, 800, 140]

  - input: assets/03-home-after-upload.png
    output: assets/annotated/step-03-container-type.png
    annotations:
      - step: 1
        label: "Container name"
        rect: [460, 365, 430, 52]
      - step: 2
        label: "Document type"
        rect: [905, 365, 430, 52]

  - input: assets/04-recipient-fields.png
    output: assets/annotated/step-04-recipient-fields.png
    annotations:
      - step: 1
        label: "Recipient full name"
        rect: [460, 565, 300, 52]
      - step: 2
        label: "Recipient email"
        rect: [965, 565, 300, 52]
      - step: 3
        label: "Role"
        rect: [1285, 565, 170, 52]
      - step: 4
        label: "Anonymous checkbox"
        rect: [1460, 570, 210, 28]

  - input: assets/05-history-filters.png
    output: assets/annotated/step-05-history-filters.png
    annotations:
      - step: 1
        label: "Status filter"
        rect: [900, 220, 360, 50]
      - step: 2
        label: "Date period"
        rect: [460, 295, 800, 50]

  - input: assets/08-external-portal.png
    output: assets/annotated/step-06-recipient-portal.png
    annotations:
      - step: 1
        label: "Select country"
        rect: [358, 215, 90, 62]
      - step: 2
        label: "Choose signing method"
        rect: [360, 295, 630, 116]

  # If due-date field moves, adjust this rectangle to the group header input.
  - input: assets/08-group-due-date.png
    output: assets/annotated/step-07-due-date.png
    annotations:
      - step: 1
        label: "Set group due date"
        rect: [151, 367, 112, 43]

  # If sign-first control moves, adjust to the checkbox at the lower left area.
  - input: assets/09-sign-first.png
    output: assets/annotated/step-08-sign-first.png
    annotations:
      - step: 1
        label: "Enable Sign first"
        rect: [61, 681, 72, 30]

  # If action buttons move, adjust to the primary start button in the bottom-right.
  - input: assets/10-start-process-button.png
    output: assets/annotated/step-09-start-process.png
    annotations:
      - step: 1
        label: "Start signing process"
        rect: [718, 709, 205, 50]

  # Use this to show selecting a process row in History.
  - input: assets/12-history-completed-list.png
    output: assets/annotated/step-10-history-open-row.png
    annotations:
      - step: 1
        label: "Open process row"
        rect: [91, 418, 1110, 42]

  # Update action in process details page.
  - input: assets/13-process-update.png
    output: assets/annotated/step-11-process-update.png
    annotations:
      - step: 1
        label: "Save updates"
        rect: [1148, 680, 76, 34]

  # Cancel action in process details page.
  - input: assets/14-process-cancel.png
    output: assets/annotated/step-12-process-cancel.png
    annotations:
      - step: 1
        label: "Cancel process"
        rect: [1068, 680, 73, 34]

  # Alternate auth view capture with same flow context.
  - input: assets/15-external-recipient-view.png
    output: assets/annotated/step-13-recipient-auth-method.png
    annotations:
      - step: 1
        label: "Authenticate with available method"
        rect: [360, 295, 630, 116]
